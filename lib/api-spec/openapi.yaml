openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: 團購/代購訂單管理 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stores
    description: Store management
  - name: products
    description: Product management
  - name: categories
    description: Product category management
  - name: orders
    description: Order management
  - name: public
    description: Public endpoints (no auth required)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me/store:
    get:
      operationId: getMyStore
      tags: [stores]
      summary: Get current merchant's store
      responses:
        "200":
          description: Store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: No store found

  /stores:
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{storeId}:
    patch:
      operationId: updateStore
      tags: [stores]
      summary: Update store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{storeId}/products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /stores/{storeId}/products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stores/{storeId}/categories:
    get:
      operationId: listProductCategories
      tags: [categories]
      summary: List product categories for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductCategory"
    post:
      operationId: createProductCategory
      tags: [categories]
      summary: Create a product category
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCategory"
        "409":
          description: Duplicate name

  /stores/{storeId}/categories/{categoryId}:
    patch:
      operationId: updateProductCategory
      tags: [categories]
      summary: Update a product category name
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCategory"
        "404":
          description: Not found
        "409":
          description: Duplicate name
    delete:
      operationId: deleteProductCategory
      tags: [categories]
      summary: Delete a product category
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /stores/{storeId}/orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /stores/{storeId}/orders/export:
    get:
      operationId: exportOrders
      tags: [orders]
      summary: Export orders as CSV
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /stores/{storeId}/stats:
    get:
      operationId: getStoreStats
      tags: [stores]
      summary: Get order statistics for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreStats"

  /orders/{orderId}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /p/{shareToken}:
    get:
      operationId: getPublicProduct
      tags: [public]
      summary: Get product by share token (public, no auth)
      parameters:
        - name: shareToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProduct"
        "404":
          description: Not found

  /p/{shareToken}/orders:
    post:
      operationId: submitOrder
      tags: [public]
      summary: Submit an order (public, no auth)
      parameters:
        - name: shareToken
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/track/{publicToken}:
    get:
      operationId: getPublicOrder
      tags: [public]
      summary: Get order status by public token (no auth)
      parameters:
        - name: publicToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicOrder"
        "404":
          description: Not found
        "429":
          description: Too many requests

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Store:
      type: object
      required: [id, merchantId, name, slug, createdAt]
      properties:
        id:
          type: integer
        merchantId:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        slug:
          type: string
        logoUrl:
          type: ["string", "null"]
        brandPrimaryColor:
          type: ["string", "null"]
        createdAt:
          type: string

    StoreInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        slug:
          type: string
          minLength: 1
        logoUrl:
          type: string

    StoreUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        logoUrl:
          type: string
        brandPrimaryColor:
          type: string

    ProductSpec:
      type: object
      required: [name, values]
      properties:
        name:
          type: string
        values:
          type: array
          items:
            type: string

    Product:
      type: object
      required: [id, storeId, name, price, inventory, shareToken, isActive, createdAt]
      properties:
        id:
          type: integer
        storeId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        inventory:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        shareToken:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
        orderDeadlineAt:
          type: ["string", "null"]
          format: date-time
        internalNote:
          type: ["string", "null"]
        skuCode:
          type: ["string", "null"]
        storageTemp:
          type: ["string", "null"]
          enum: [ambient, chilled, frozen, null]
        shelfLife:
          type: ["string", "null"]
        weightKg:
          type: ["number", "null"]
        categoryId:
          type: ["integer", "null"]

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        inventory:
          type: integer
        imageUrl:
          type: string
        orderDeadlineAt:
          type: string
          format: date-time
        internalNote:
          type: string
        skuCode:
          type: string
        storageTemp:
          type: string
          enum: [ambient, chilled, frozen]
        shelfLife:
          type: string
        weightKg:
          type: number
          format: float
        categoryId:
          type: integer

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        inventory:
          type: integer
        imageUrl:
          type: string
        isActive:
          type: boolean
        orderDeadlineAt:
          type: ["string", "null"]
          format: date-time
        internalNote:
          type: ["string", "null"]
        skuCode:
          type: ["string", "null"]
        storageTemp:
          type: ["string", "null"]
          enum: [ambient, chilled, frozen, null]
        shelfLife:
          type: ["string", "null"]
        weightKg:
          type: ["number", "null"]
        categoryId:
          type: ["integer", "null"]

    PublicProduct:
      type: object
      required: [id, name, price, storeName, shareToken]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        inventory:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        storeName:
          type: string
        shareToken:
          type: string
        orderDeadlineAt:
          type: ["string", "null"]
          format: date-time
        storageTemp:
          type: ["string", "null"]
          enum: [ambient, chilled, frozen, null]
        shelfLife:
          type: ["string", "null"]
        weightKg:
          type: ["number", "null"]
        brandPrimaryColor:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, productId, storeId, publicToken, buyerName, buyerPhone, pickupMethod, quantity, totalPrice, status, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        storeId:
          type: integer
        productName:
          type: ["string", "null"]
        publicToken:
          type: string
        buyerName:
          type: string
        buyerPhone:
          type: string
        pickupMethod:
          type: string
        notes:
          type: ["string", "null"]
        specValues:
          type: object
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, awaiting_payment, preparing, shipped, completed, cancelled]
        createdAt:
          type: string

    PublicOrder:
      type: object
      required: [publicToken, quantity, unitPrice, totalPrice, pickupMethod, status, statusLabel, createdAt]
      properties:
        publicToken:
          type: string
        productName:
          type: ["string", "null"]
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number
        pickupMethod:
          type: string
        specValues:
          type: object
        status:
          type: string
          enum: [pending, awaiting_payment, preparing, shipped, completed, cancelled]
        statusLabel:
          type: string
        createdAt:
          type: string

    OrderInput:
      type: object
      required: [buyerName, buyerPhone, pickupMethod, quantity]
      properties:
        buyerName:
          type: string
          minLength: 1
        buyerPhone:
          type: string
          minLength: 1
        pickupMethod:
          type: string
          minLength: 1
        notes:
          type: string
        specValues:
          type: object
        quantity:
          type: integer
          minimum: 1

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, awaiting_payment, preparing, shipped, completed, cancelled]

    StoreStats:
      type: object
      required: [totalOrders, pendingOrders, totalRevenue, statusBreakdown]
      properties:
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        totalRevenue:
          type: number
        statusBreakdown:
          type: array
          items:
            type: object
            required: [status, count]
            properties:
              status:
                type: string
              count:
                type: integer

    ProductCategory:
      type: object
      required: [id, storeId, name, createdAt]
      properties:
        id:
          type: integer
        storeId:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    ProductCategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
