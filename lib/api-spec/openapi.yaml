openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: 團購/代購訂單管理 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stores
    description: Store management
  - name: products
    description: Product management
  - name: categories
    description: Product category management
  - name: orders
    description: Order management
  - name: public
    description: Public endpoints (no auth required)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me/store:
    get:
      operationId: getMyStore
      tags: [stores]
      summary: Get current merchant's store
      responses:
        "200":
          description: Store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: No store found

  /stores:
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{storeId}:
    patch:
      operationId: updateStore
      tags: [stores]
      summary: Update store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{storeId}/products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /stores/{storeId}/products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stores/{storeId}/categories:
    get:
      operationId: listProductCategories
      tags: [categories]
      summary: List product categories for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductCategory"
    post:
      operationId: createProductCategory
      tags: [categories]
      summary: Create a product category
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCategory"
        "409":
          description: Duplicate name

  /stores/{storeId}/categories/{categoryId}:
    patch:
      operationId: updateProductCategory
      tags: [categories]
      summary: Update a product category name
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductCategory"
        "404":
          description: Not found
        "409":
          description: Duplicate name
    delete:
      operationId: deleteProductCategory
      tags: [categories]
      summary: Delete a product category
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /stores/{storeId}/orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createMerchantOrder
      tags: [orders]
      summary: Create an order from merchant backend
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantOrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error
        "403":
          description: Forbidden
        "404":
          description: Product not found

  /stores/{storeId}/orders/export:
    get:
      operationId: exportOrders
      tags: [orders]
      summary: Export orders as CSV
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /stores/{storeId}/stats:
    get:
      operationId: getStoreStats
      tags: [stores]
      summary: Get order statistics for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreStats"

  /orders/{orderId}:
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order basic info (merchant)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error
        "403":
          description: Forbidden
        "404":
          description: Order not found
        "422":
          description: Cannot edit completed or cancelled order

  /orders/{orderId}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/picking-list:
    post:
      operationId: getPickingList
      tags: [orders]
      summary: Get picking list for selected orders (grouped by product)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderIdsBody"
      responses:
        "200":
          description: Picking list grouped by product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickingListResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — order belongs to another store
        "422":
          description: Validation error or order not found

  /orders/shipping-list:
    post:
      operationId: getShippingList
      tags: [orders]
      summary: Get shipping list for selected orders (one entry per order)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderIdsBody"
      responses:
        "200":
          description: Shipping list one entry per order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShippingListResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — order belongs to another store
        "422":
          description: Validation error or order not found

  /orders/picking-list.csv:
    post:
      operationId: downloadPickingListCsv
      tags: [orders]
      summary: Download picking list as CSV (UTF-8 BOM, grouped by product)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderIdsBody"
      responses:
        "200":
          description: CSV file download
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="picking-list-20241201-1430.csv"'
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — order belongs to another store
        "422":
          description: Validation error or order not found

  /orders/shipping-list.csv:
    post:
      operationId: downloadShippingListCsv
      tags: [orders]
      summary: Download shipping list as CSV (UTF-8 BOM, one row per order)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderIdsBody"
      responses:
        "200":
          description: CSV file download
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="shipping-list-20241201-1430.csv"'
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — order belongs to another store
        "422":
          description: Validation error or order not found

  /orders/bulk:
    patch:
      operationId: bulkUpdateOrders
      tags: [orders]
      summary: Bulk update payment/shipping status for multiple orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkOrderUpdate"
      responses:
        "200":
          description: Bulk update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkOrderUpdateResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "422":
          description: Semantic validation error

  /orders/tracking-import:
    post:
      operationId: importOrderTracking
      tags: [orders]
      summary: Batch import tracking codes for orders (merchant, auth required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackingImportBody"
      responses:
        "200":
          description: Import result (partial success possible)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackingImportResponse"
        "400":
          description: Validation error (missing or empty rows)
        "401":
          description: Unauthorized
        "422":
          description: Request contains publicToken field (forbidden)

  /p/{shareToken}:
    get:
      operationId: getPublicProduct
      tags: [public]
      summary: Get product by share token (public, no auth)
      parameters:
        - name: shareToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProduct"
        "404":
          description: Not found

  /p/{shareToken}/orders:
    post:
      operationId: submitOrder
      tags: [public]
      summary: Submit an order (public, no auth)
      parameters:
        - name: shareToken
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/track/{publicToken}:
    get:
      operationId: getPublicOrder
      tags: [public]
      summary: Get order status by public token (no auth)
      parameters:
        - name: publicToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicOrder"
        "404":
          description: Not found
        "429":
          description: Too many requests

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Store:
      type: object
      required: [id, merchantId, name, slug, createdAt]
      properties:
        id:
          type: integer
        merchantId:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        slug:
          type: string
        logoUrl:
          type: ["string", "null"]
        brandPrimaryColor:
          type: ["string", "null"]
        createdAt:
          type: string

    StoreInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        slug:
          type: string
          minLength: 1
        logoUrl:
          type: string

    StoreUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        logoUrl:
          type: string
        brandPrimaryColor:
          type: string

    ProductSpec:
      type: object
      required: [name, values]
      properties:
        name:
          type: string
        values:
          type: array
          items:
            type: string

    Product:
      type: object
      required: [id, storeId, name, price, inventory, shareToken, isActive, createdAt]
      properties:
        id:
          type: integer
        storeId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        inventory:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        shareToken:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
        orderDeadlineAt:
          type: ["string", "null"]
          format: date-time
        internalNote:
          type: ["string", "null"]
        skuCode:
          type: ["string", "null"]
        storageTemp:
          type: ["string", "null"]
          enum: [ambient, chilled, frozen, null]
        shelfLife:
          type: ["string", "null"]
        weightKg:
          type: ["number", "null"]
        categoryId:
          type: ["integer", "null"]

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        inventory:
          type: integer
        imageUrl:
          type: string
        orderDeadlineAt:
          type: string
          format: date-time
        internalNote:
          type: string
        skuCode:
          type: string
        storageTemp:
          type: string
          enum: [ambient, chilled, frozen]
        shelfLife:
          type: string
        weightKg:
          type: number
          format: float
        categoryId:
          type: integer

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        price:
          type: number
          minimum: 0
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        inventory:
          type: integer
        imageUrl:
          type: string
        isActive:
          type: boolean
        orderDeadlineAt:
          type: ["string", "null"]
          format: date-time
        internalNote:
          type: ["string", "null"]
        skuCode:
          type: ["string", "null"]
        storageTemp:
          type: ["string", "null"]
          enum: [ambient, chilled, frozen, null]
        shelfLife:
          type: ["string", "null"]
        weightKg:
          type: ["number", "null"]
        categoryId:
          type: ["integer", "null"]

    PublicProduct:
      type: object
      required: [id, name, price, storeName, shareToken]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        inventory:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        storeName:
          type: string
        shareToken:
          type: string
        orderDeadlineAt:
          type: ["string", "null"]
          format: date-time
        storageTemp:
          type: ["string", "null"]
          enum: [ambient, chilled, frozen, null]
        shelfLife:
          type: ["string", "null"]
        weightKg:
          type: ["number", "null"]
        brandPrimaryColor:
          type: ["string", "null"]

    PaymentMethod:
      type: ["string", "null"]
      enum: [cash, bank_transfer, line_pay, other, null]

    PaymentStatus:
      type: string
      enum: [unpaid, pending, partially_paid, paid, refunded, failed]

    ShippingMethod:
      type: ["string", "null"]
      enum: [self_pickup, convenience_store, home_delivery, other, null]

    ShippingStatus:
      type: string
      enum: [not_shipped, preparing, shipped, arrived, picked_up, returned, cancelled]

    Order:
      type: object
      required: [id, productId, storeId, publicToken, buyerName, buyerPhone, pickupMethod, quantity, totalPrice, status, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        storeId:
          type: integer
        productName:
          type: ["string", "null"]
        publicToken:
          type: string
        buyerName:
          type: string
        buyerPhone:
          type: string
        pickupMethod:
          type: string
        notes:
          type: ["string", "null"]
        specValues:
          type: object
        quantity:
          type: integer
        unitPrice:
          type: number
        shippingFee:
          type: number
        totalPrice:
          type: number
        orderTotal:
          type: number
        remainingAmount:
          type: number
        status:
          type: string
          enum: [pending, awaiting_payment, preparing, shipped, completed, cancelled]
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        paymentStatus:
          $ref: "#/components/schemas/PaymentStatus"
        paidAmount:
          type: ["number", "null"]
        paymentNote:
          type: ["string", "null"]
        shippingMethod:
          $ref: "#/components/schemas/ShippingMethod"
        shippingStatus:
          $ref: "#/components/schemas/ShippingStatus"
        recipientName:
          type: ["string", "null"]
        recipientPhone:
          type: ["string", "null"]
        recipientAddress:
          type: ["string", "null"]
        storeCode:
          type: ["string", "null"]
        storeName:
          type: ["string", "null"]
        cvsStoreAddress:
          type: ["string", "null"]
        cvsStorePhone:
          type: ["string", "null"]
        storeSelectedBy:
          type: ["string", "null"]
        storeSelectedAt:
          type: ["string", "null"]
        trackingCode:
          type: ["string", "null"]
        trackingProvider:
          type: ["string", "null"]
        shippingNote:
          type: ["string", "null"]
        internalNote:
          type: ["string", "null"]
        createdAt:
          type: string

    PublicOrder:
      type: object
      required: [publicToken, quantity, unitPrice, shippingFee, totalPrice, orderTotal, pickupMethod, status, statusLabel, shippingStatus, createdAt]
      properties:
        publicToken:
          type: string
        productName:
          type: ["string", "null"]
        quantity:
          type: integer
        unitPrice:
          type: number
        shippingFee:
          type: number
        totalPrice:
          type: number
        orderTotal:
          type: number
        pickupMethod:
          type: string
        specValues:
          type: object
        status:
          type: string
          enum: [pending, awaiting_payment, preparing, shipped, completed, cancelled]
        statusLabel:
          type: string
        shippingStatus:
          $ref: "#/components/schemas/ShippingStatus"
        shippingStatusLabel:
          type: string
        trackingCode:
          type: ["string", "null"]
        trackingProvider:
          type: ["string", "null"]
        createdAt:
          type: string

    OrderInput:
      type: object
      required: [buyerName, buyerPhone, pickupMethod, quantity]
      properties:
        buyerName:
          type: string
          minLength: 1
        buyerPhone:
          type: string
          minLength: 1
        pickupMethod:
          type: string
          minLength: 1
        notes:
          type: string
        specValues:
          type: object
        quantity:
          type: integer
          minimum: 1

    MerchantOrderInput:
      type: object
      required: [productId, buyerName, buyerPhone, quantity, pickupMethod]
      properties:
        productId:
          type: integer
        buyerName:
          type: string
          minLength: 1
        buyerPhone:
          type: string
          minLength: 1
        quantity:
          type: integer
          minimum: 1
        pickupMethod:
          type: string
          minLength: 1
        notes:
          type: ["string", "null"]
        specValues:
          type: object

    OrderUpdate:
      type: object
      properties:
        buyerName:
          type: string
          minLength: 1
        buyerPhone:
          type: string
          minLength: 1
        quantity:
          type: integer
          minimum: 1
        pickupMethod:
          type: string
          minLength: 1
        notes:
          type: ["string", "null"]
        specValues:
          type: object
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        paymentStatus:
          $ref: "#/components/schemas/PaymentStatus"
        paidAmount:
          type: ["number", "null"]
          minimum: 0
        paymentNote:
          type: ["string", "null"]
        shippingMethod:
          $ref: "#/components/schemas/ShippingMethod"
        shippingStatus:
          $ref: "#/components/schemas/ShippingStatus"
        shippingFee:
          type: number
          minimum: 0
        recipientName:
          type: ["string", "null"]
        recipientPhone:
          type: ["string", "null"]
        recipientAddress:
          type: ["string", "null"]
        storeCode:
          type: ["string", "null"]
        storeName:
          type: ["string", "null"]
        cvsStoreAddress:
          type: ["string", "null"]
        cvsStorePhone:
          type: ["string", "null"]
        storeSelectedBy:
          type: string
          enum: [customer, admin, system]
        trackingCode:
          type: ["string", "null"]
        trackingProvider:
          type: ["string", "null"]
        shippingNote:
          type: ["string", "null"]
        internalNote:
          type: ["string", "null"]

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, awaiting_payment, preparing, shipped, completed, cancelled]

    StoreStats:
      type: object
      required: [totalOrders, pendingOrders, totalRevenue, statusBreakdown]
      properties:
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        totalRevenue:
          type: number
        statusBreakdown:
          type: array
          items:
            type: object
            required: [status, count]
            properties:
              status:
                type: string
              count:
                type: integer

    ProductCategory:
      type: object
      required: [id, storeId, name, createdAt]
      properties:
        id:
          type: integer
        storeId:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    ProductCategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80

    OrderIdsBody:
      type: object
      required: [orderIds]
      properties:
        orderIds:
          type: array
          items:
            type: integer
          minItems: 1

    PickingListItem:
      type: object
      required: [productId, productName, quantityTotal, orderIds, orderNumbers]
      properties:
        productId:
          type: integer
        skuCode:
          type: ["string", "null"]
        productName:
          type: string
        specValues:
          type: object
        specLabel:
          type: ["string", "null"]
        storageTemp:
          type: ["string", "null"]
          enum: [ambient, chilled, frozen, null]
        shelfLife:
          type: ["string", "null"]
        quantityTotal:
          type: integer
        orderIds:
          type: array
          items:
            type: integer
        orderNumbers:
          type: array
          items:
            type: string
        notes:
          type: string

    PickingListResponse:
      type: object
      required: [generatedAt, orderCount, excludedOrderIds, items]
      properties:
        generatedAt:
          type: string
          format: date-time
        orderCount:
          type: integer
        excludedOrderIds:
          type: array
          items:
            type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/PickingListItem"

    ShippingListOrder:
      type: object
      required: [orderId, orderNumber, status, buyerName, buyerPhone, productName, quantity, paymentStatus, shippingStatus, itemsText]
      properties:
        orderId:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
        buyerName:
          type: string
        buyerPhone:
          type: string
        productName:
          type: ["string", "null"]
        skuCode:
          type: ["string", "null"]
        specValues:
          type: object
        quantity:
          type: integer
        paymentStatus:
          $ref: "#/components/schemas/PaymentStatus"
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        shippingStatus:
          $ref: "#/components/schemas/ShippingStatus"
        shippingMethod:
          $ref: "#/components/schemas/ShippingMethod"
        trackingCode:
          type: ["string", "null"]
        trackingProvider:
          type: ["string", "null"]
        storeCode:
          type: ["string", "null"]
        storeName:
          type: ["string", "null"]
        recipientName:
          type: ["string", "null"]
        recipientPhone:
          type: ["string", "null"]
        recipientAddress:
          type: ["string", "null"]
        shippingNote:
          type: ["string", "null"]
        itemsText:
          type: string

    ShippingListResponse:
      type: object
      required: [generatedAt, orderCount, excludedOrderIds, orders]
      properties:
        generatedAt:
          type: string
          format: date-time
        orderCount:
          type: integer
        excludedOrderIds:
          type: array
          items:
            type: integer
        orders:
          type: array
          items:
            $ref: "#/components/schemas/ShippingListOrder"

    BulkOrderUpdate:
      type: object
      required: [orderIds]
      properties:
        orderIds:
          type: array
          items:
            type: integer
          minItems: 1
        paymentStatus:
          $ref: "#/components/schemas/PaymentStatus"
        shippingStatus:
          $ref: "#/components/schemas/ShippingStatus"

    BulkOrderUpdateResponse:
      type: object
      required: [updatedCount, skippedCount, skippedOrderIds]
      properties:
        updatedCount:
          type: integer
        skippedCount:
          type: integer
        skippedOrderIds:
          type: array
          items:
            type: integer

    TrackingProvider:
      type: string
      enum: ["711", familymart, home_delivery, other]
      description: >
        Carrier provider code. Note: "familymart" here is distinct from
        cvsStores.provider value "family" — these are different enum contexts.

    TrackingImportRow:
      type: object
      required: [orderId, trackingProvider, trackingCode]
      properties:
        orderId:
          type: string
          description: Order ID as plain integer string (e.g. "123") or "#123" format
        trackingProvider:
          $ref: "#/components/schemas/TrackingProvider"
        trackingCode:
          type: string
          minLength: 1
          maxLength: 100
          description: Carrier tracking number (trimmed, max 100 chars)

    TrackingImportBody:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/TrackingImportRow"
          minItems: 1
          description: >
            Must not contain any row with a "publicToken" key.
            Presence of publicToken in any row rejects the entire request (HTTP 422).

    TrackingImportError:
      type: object
      required: [row, reason]
      properties:
        row:
          type: integer
          description: 1-based row index in the submitted rows array
        orderId:
          type: string
          description: The orderId from the row that failed (if available)
        reason:
          type: string
          description: Human-readable error reason

    TrackingImportResponse:
      type: object
      required: [totalRows, successCount, failedCount, errors]
      properties:
        totalRows:
          type: integer
        successCount:
          type: integer
        failedCount:
          type: integer
        errors:
          type: array
          items:
            $ref: "#/components/schemas/TrackingImportError"
