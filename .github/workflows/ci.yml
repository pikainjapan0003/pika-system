name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pika_ci

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pika_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pika_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create disposable test schema
        run: pnpm --filter @workspace/db run push-force

      - name: Test database routes
        id: database-route-tests
        working-directory: artifacts/api-server
        run: |
          mkdir -p ../../test-results
          node \
            --experimental-test-module-mocks \
            --import tsx/esm \
            --test-reporter=spec \
            --test-reporter-destination=stdout \
            --test-reporter=junit \
            --test-reporter-destination=../../test-results/database-routes.junit.xml \
            --test \
            src/routes/orderProfitSnapshot.route.test.mjs \
            src/routes/logisticsSyncCommitKillSwitch.route.test.mjs

      - name: Add test summary
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.database-route-tests.outcome }}
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, existsSync, readFileSync } from "node:fs";

          const reportPath = "test-results/database-routes.junit.xml";
          const rows = [`## Database route tests`, ``, `Outcome: **${process.env.TEST_OUTCOME}**`];
          if (existsSync(reportPath)) {
            const xml = readFileSync(reportPath, "utf8");
            const values = Object.fromEntries(
              [...xml.matchAll(/<!-- (tests|pass|fail|skipped|duration_ms) ([^ ]+) -->/g)].map(
                ([, key, value]) => [key, value],
              ),
            );
            rows.push(
              ``,
              `| Tests | Passed | Failed | Skipped | Duration |`,
              `|---:|---:|---:|---:|---:|`,
              `| ${values.tests ?? "?"} | ${values.pass ?? "?"} | ${values.fail ?? "?"} | ${values.skipped ?? "?"} | ${values.duration_ms ?? "?"} ms |`,
              ``,
              `JUnit report: \`${reportPath}\` (included in the CI artifacts).`,
            );
          } else {
            rows.push(``, `JUnit report was not created.`);
          }
          appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${rows.join("\n")}\n`);
          NODE

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
        env:
          PORT: 3000
          BASE_PATH: /

      - name: Upload test reports and build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-results-${{ github.run_attempt }}
          path: |
            test-results/
            artifacts/*/dist/
          if-no-files-found: warn
          retention-days: 7
