name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # 03:00 Asia/Taipei (UTC+8) = 19:00 UTC on the previous day.
    - cron: "0 19 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pika_ci

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pika_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pika_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Prettier formatting
        run: pnpm exec prettier --check . --ignore-path .prettierignore --end-of-line auto

      - name: Create disposable test schema
        run: pnpm --filter @workspace/db run push-force

      - name: Test database routes
        id: database-route-tests
        working-directory: artifacts/api-server
        run: |
          mkdir -p ../../test-results
          node \
            --experimental-test-module-mocks \
            --import tsx/esm \
            --test-reporter=spec \
            --test-reporter-destination=stdout \
            --test-reporter=junit \
            --test-reporter-destination=../../test-results/database-routes.junit.xml \
            --test \
            src/routes/orderProfitSnapshot.route.test.mjs \
            src/routes/logisticsSyncCommitKillSwitch.route.test.mjs \
            src/routes/customersAndProfitIsolation.route.test.mjs \
            src/routes/public.route.test.mjs \
            src/routes/publicRateLimit.route.test.mjs \
            src/routes/skills.route.test.mjs \
            src/routes/devHandoffProductionGuard.route.test.mjs

      - name: Test pure function suites
        id: pure-function-tests
        working-directory: artifacts/api-server
        run: |
          mkdir -p ../../test-results
          mapfile -t pure_tests < <(
            find ../../lib -type f -name '*.test.mjs' ! -path '*/generated/*' -print
            find ../shop-app/src/lib -type f -name '*.test.mjs' -print
            find ../shop-app/src/test -type f -name '*.test.mjs' -print
            find src/lib -type f -name '*.test.mjs' -print
            find src -maxdepth 1 -type f -name '*.integration.test.mjs' -print
          )
          TSX_TSCONFIG_PATH=../shop-app/tsconfig.json node \
            --experimental-test-module-mocks \
            --import tsx/esm \
            --experimental-test-coverage \
            --test-reporter=spec \
            --test-reporter-destination=stdout \
            --test-reporter=junit \
            --test-reporter-destination=../../test-results/pure-functions.junit.xml \
            --test \
            "${pure_tests[@]}" | tee ../../test-results/pure-functions.log

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed Playwright smoke fixture
        run: pnpm --filter @workspace/api-server exec node --import tsx/esm e2e/seedSmoke.mjs

      - name: Run Playwright smoke tests
        id: playwright-smoke
        run: pnpm exec playwright test --config e2e/playwright.config.mjs

      - name: Upload Playwright failure traces and screenshots
        if: failure() && steps.playwright-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: playwright-failure-${{ github.run_attempt }}
          path: e2e/test-results/
          if-no-files-found: warn
          retention-days: 7

      - name: Add test summary
        if: always()
        env:
          DATABASE_TEST_OUTCOME: ${{ steps.database-route-tests.outcome }}
          PURE_TEST_OUTCOME: ${{ steps.pure-function-tests.outcome }}
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, existsSync, readFileSync } from "node:fs";

          const reports = [
            ["Database route tests", "test-results/database-routes.junit.xml", process.env.DATABASE_TEST_OUTCOME],
            ["Pure function tests", "test-results/pure-functions.junit.xml", process.env.PURE_TEST_OUTCOME],
          ];
          const rows = [];
          for (const [title, reportPath, outcome] of reports) {
            rows.push(`## ${title}`, ``, `Outcome: **${outcome}**`);
            if (existsSync(reportPath)) {
              const xml = readFileSync(reportPath, "utf8");
              const values = Object.fromEntries(
                [...xml.matchAll(/<!-- (tests|pass|fail|skipped|duration_ms) ([^ ]+) -->/g)].map(
                  ([, key, value]) => [key, value],
                ),
              );
              rows.push(
                ``,
                `| Tests | Passed | Failed | Skipped | Duration |`,
                `|---:|---:|---:|---:|---:|`,
                `| ${values.tests ?? "?"} | ${values.pass ?? "?"} | ${values.fail ?? "?"} | ${values.skipped ?? "?"} | ${values.duration_ms ?? "?"} ms |`,
                ``,
                `JUnit report: \`${reportPath}\` (included in the CI artifacts).`,
              );
            } else {
              rows.push(``, `JUnit report was not created.`);
            }
            rows.push(``);
          }
          const coveragePath = "test-results/pure-functions.log";
          rows.push(
            `## Native coverage summary`,
            ``,
            `Informational only; no coverage threshold is enforced.`,
            ``,
          );
          if (existsSync(coveragePath)) {
            const output = readFileSync(coveragePath, "utf8").replace(/\u001b\[[0-9;]*m/g, "");
            const coverage = output.match(
              /ℹ start of coverage report\r?\n([\s\S]*?)ℹ end of coverage report/,
            )?.[1]?.trim();
            if (coverage) {
              rows.push(`\`\`\`text`, coverage, `\`\`\``, ``);
            } else {
              rows.push(`Native coverage output was not found in the test log.`, ``);
            }
          } else {
            rows.push(`Pure-function test log was not created.`, ``);
          }
          appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${rows.join("\n")}\n`);
          NODE

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
        env:
          PORT: 3000
          BASE_PATH: /

      - name: Upload test reports and build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-results-${{ github.run_attempt }}
          path: |
            test-results/
            artifacts/*/dist/
          if-no-files-found: warn
          retention-days: 7

      - name: Mark nightly result in job summary
        if: always() && github.event_name == 'schedule'
        env:
          NIGHTLY_STATUS: ${{ job.status }}
        run: |
          if [ "$NIGHTLY_STATUS" = "success" ]; then
            printf '## ✅ Nightly CI passed\n\nAll scheduled checks completed successfully.\n' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '## 🚨 Nightly CI failed\n\nOpen the failed step above; no external notification or automatic write was sent.\n' >> "$GITHUB_STEP_SUMMARY"
          fi

  rate-source-probe:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.34.4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Probe Bank of Taiwan JPY spot selling reference
        working-directory: artifacts/api-server
        run: node --import tsx/esm scripts/probeExchangeRateReference.mjs
